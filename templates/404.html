{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="stat-icon-wrapper mx-auto mb-4" style="width: 100px; height: 100px; font-size: 3.5rem; border-radius: 50%; color: var(--primary-color); display: flex; align-items: center; justify-content: center; background-color: rgba(99, 102, 241, 0.1);">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h1 class="text-white fw-bold display-4 mb-3">Case Not Found</h1>
        <p class="text-secondary fs-5 mb-4">The FIR or record you are looking for does not exist.</p>
        <a href="/" class="btn btn-primary px-4 py-2 rounded-3 shadow" style="background-color: var(--primary-color); border: none;">
            <i class="bi bi-house-door-fill me-2"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
