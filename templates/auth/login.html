<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Crime Record & FIR Management System</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .login-card {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }
        .login-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }
        .app-title {
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="stat-icon-wrapper mx-auto mb-3" style="width: 70px; height: 70px; font-size: 2.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: rgba(99, 102, 241, 0.1); color: var(--primary-color);">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h4 class="app-title mb-1 text-uppercase tracking-wider">Crime Record & FIR</h4>
                <p class="text-secondary fs-7">Management System Portal</p>
            </div>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-danger border border-danger border-opacity-25 bg-danger bg-opacity-10 text-danger alert-dismissible fade show rounded-3 fs-8 mb-3" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close" style="font-size: 0.75rem;"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <!-- Badge Number -->
                <div class="mb-3">
                    <label for="badge_number" class="form-label text-secondary fw-semibold fs-8 text-uppercase">Badge Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-25 text-secondary"><i class="bi bi-person-badge"></i></span>
                        <input type="text" class="form-control bg-dark border-secondary border-opacity-25 text-white" id="badge_number" name="badge_number" placeholder="e.g. KA-001" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold fs-8 text-uppercase">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary border-opacity-25 text-secondary"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control bg-dark border-secondary border-opacity-25 text-white" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fw-semibold shadow mb-3" style="background-color: var(--primary-color); border: none;">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="/public" class="text-indigo-400 text-decoration-none fs-8 fw-semibold hover-underline">
                    File a public complaint &rarr;
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
